# Fly.io deployment config.
#
# First-time setup (one-time, per `docs/deployment.md`):
#   fly auth login
#   fly apps create direct-indexing            # or whatever app name you prefer
#   fly postgres create --name di-db           # creates a managed Postgres cluster
#   fly postgres attach di-db                  # injects DATABASE_URL as a secret
#   fly secrets set JWT_SECRET=$(openssl rand -hex 32) \
#                   ADMIN_PASSWORD=... \
#                   FINNHUB_API_KEY=... \
#                   ANTHROPIC_API_KEY=... \
#                   FIELD_ENCRYPTION_KEYS=$(python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())") \
#                   SMTP_HOST=sandbox.smtp.mailtrap.io \
#                   SMTP_PORT=2525 \
#                   SMTP_USER=... \
#                   SMTP_PASSWORD=...
#   fly deploy
#
# Subsequent deploys:
#   fly deploy

app = "direct-indexing"
primary_region = "iad"   # or sjc, lhr, syd — pick closest to your users

[build]

[env]
  JSON_LOGS = "1"
  SENTRY_ENVIRONMENT = "production"
  APP_VERSION = "1.0.0"
  APP_BASE_URL = "https://direct-indexing.fly.dev"   # swap for your custom domain
  CORS_ORIGINS = "https://direct-indexing.fly.dev"
  TOTP_ISSUER = "DirectIndex Pro"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
