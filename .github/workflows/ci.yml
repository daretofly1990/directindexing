name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FINNHUB_API_KEY: test-key
      JWT_SECRET: test-secret-at-least-32-characters-long
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: testpass
      FIELD_ENCRYPTION_KEYS: ""
      # Force failure detail to stdout for easier CI debugging
      PYTHONDONTWRITEBYTECODE: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Show environment
        run: |
          python --version
          pip --version
          echo "--- OS ---"
          cat /etc/os-release | head -5 || true

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt
          pip install ruff
          echo "--- installed versions ---"
          pip list | grep -iE "bcrypt|passlib|pydantic|fastapi|sqlalchemy|anthropic|stripe|sentry|reportlab|aiosmtplib|boto3|pyotp|slowapi|cryptography|ruff|pytest" || true

      - name: Lint (ruff)
        run: ruff check backend/ --output-format=github

      - name: Run full test suite
        run: pytest backend/tests/ -v --tb=short -rfE

  ai-eval:
    runs-on: ubuntu-latest
    env:
      FINNHUB_API_KEY: test-key
      JWT_SECRET: test-secret-at-least-32-characters-long
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: testpass
      FIELD_ENCRYPTION_KEYS: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt

      - name: AI guardrail regression suite
        # Named job so branch-protection rules can require the AI eval pass
        # independently of the rest of the tests. If these fail, the agent
        # behavior regressed — do not merge.
        run: pytest backend/tests/test_ai_guardrails.py -v --tb=short -rfE

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t direct-indexing:ci .
